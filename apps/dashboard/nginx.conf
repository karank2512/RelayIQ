server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (TLS termination is expected upstream; HSTS applies behind it).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # CSP: the SPA is fully self-contained (no third-party scripts/fonts). connect-src
    # 'self' works because /v1 is proxied through this same origin.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

    client_max_body_size 2m;

    # API + docs + metrics proxied to the backend container
    location ~ ^/(v1|docs|openapi.json|metrics|healthz|readyz) {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-Id $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
